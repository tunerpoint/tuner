<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Notes</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial, sans-serif;
    background:#f1f3f4;
    min-height:100vh;
}

.notes{
    display:grid;
    gap:4px;
    padding:4px;
}

.note{
    background:rgb(243, 241, 247);
    width:100%;
    min-height: 100vh;
    height: auto;
    padding:25px;
    display:flex;
    flex-direction:column;
    page-break-after:always;
    overflow: visible;
}

.note-title{
    font-weight:bold;
    margin-bottom:10px;
    outline:none;
}

.note-content{
    flex:1;
    outline:none;
    overflow:auto;
}

/* TABLE */
.note-content table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
.note-content td{
    border:1px solid #ccc;
    padding:5px;
}

/* IMAGE */
.image-wrapper{
    position:relative;
    margin:10px auto;
    text-align:left;
    width:200px;
}
.image-wrapper img{
    width:100%;
    border-radius:8px;
    display:block;
}
.image-slider{
    width:100%;
    margin-top:6px;
}

/* FLOATING TOOLBAR */

.fab-container{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
    transition:bottom .3s ease;
}

.fab-main{
    height:30px;
    width:30px;
    border-radius:50%;
    border:none;
    background:#1976d2;
    color:white;
    font-size:15px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transition:.3s ease;
}

.fab-main.rotate{
    transform:rotate(45deg);
}

.fab-toolbar{
    position:absolute;
    bottom:75px;
    right:0;

    display:flex;
    flex-direction:row;
    flex-wrap:wrap;
    gap:8px;

    width:260px;              /* controls wrapping */
    max-height:60vh;          /* prevents overflow */
    overflow-y:auto;

    background:white;
    padding:12px;
    border-radius:14px;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);

    transform:scale(0);
    transform-origin:bottom right;
    transition:.25s ease;
}

.fab-toolbar.active{
    transform:scale(1);
}

.fab-toolbar button{
    border:none;
    background:#e0e0e0;
    height:40px;
    width:40px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.fab-toolbar button:hover{
    background:#d0d0d0;
}

/* FIX LIST + JUSTIFY */

.note-content {
    white-space: pre-wrap;
}

.note-content ul,
.note-content ol {
    padding-left: 40px;
    margin: 5px 0;
}

.note-content li {
    margin-bottom: 4px;
}
</style>
</head>
<body>

<div class="notes" id="notes"></div>

<!-- FLOATING TOOLBAR -->
<div class="fab-container" id="fabContainer">
    <div class="fab-toolbar" id="fabToolbar">

        <button onclick="format('bold')" title="Bold"><i class="fas fa-bold"></i></button>
        <button onclick="format('underline')" title="Underline"><i class="fas fa-underline"></i></button>
        <button onclick="format('strikeThrough')" title="Strike"><i class="fas fa-strikethrough"></i></button>
        <button onclick="highlightText()" title="Highlight"><i class="fas fa-highlighter"></i></button>

        <button onclick="format('insertUnorderedList')" title="Bullets"><i class="fas fa-list-ul"></i></button>
        <button onclick="format('insertOrderedList')" title="Numbers"><i class="fas fa-list-ol"></i></button>

        <button onclick="format('indent')" title="Indent"><i class="fas fa-indent"></i></button>
        <button onclick="format('outdent')" title="Outdent"><i class="fas fa-outdent"></i></button>

        <button onclick="format('justifyLeft')" title="Left"><i class="fas fa-align-left"></i></button>
        <button onclick="format('justifyCenter')" title="Center"><i class="fas fa-align-center"></i></button>
        <button onclick="format('justifyFull')" title="Justify"><i class="fas fa-align-justify"></i></button>

        <button onclick="insertTable()" title="Table"><i class="fas fa-table"></i></button>
        <button onclick="insertCheckbox()" title="Checkbox"><i class="fas fa-square-check"></i></button>
        <button onclick="insertImage()" title="Image"><i class="fas fa-image"></i></button>

        <button onclick="saveNoteAsImage()" title="Save Image"><i class="fas fa-file-image"></i></button>
        <button onclick="saveNoteAsPDF()" title="Save PDF"><i class="fas fa-file-pdf"></i></button>

        <button onclick="createNote()" title="New Page"><i class="fas fa-file-circle-plus"></i></button>
    </div>

    <button class="fab-main" id="fabMain" onclick="toggleToolbar()">
        <i class="fas fa-plus"></i>
    </button>
</div>

<script>
const notesContainer=document.getElementById("notes");
let activeContent=null;

/* CREATE PAGE */
function createNote(){
    const note=document.createElement("div");
    note.className="note";
    note.innerHTML=`
        
        <div contenteditable="true" class="note-content"></div>
    `;
    notesContainer.appendChild(note);
    note.scrollIntoView({behavior:"smooth"});
}

/* TRACK ACTIVE EDITOR */
document.addEventListener("focusin",e=>{
    if(e.target.classList.contains("note-content")){
        activeContent=e.target;
    }
});

/* FORMAT */
function format(command) {
    if (!activeContent) return;
    activeContent.focus();
    
    /* FIX JUSTIFY (more reliable than execCommand) */
    if (command === "justifyLeft") {
        activeContent.style.textAlign = "left";
        return;
    }
    if (command === "justifyCenter") {
        activeContent.style.textAlign = "center";
        return;
    }
    if (command === "justifyFull") {
        activeContent.style.textAlign = "justify";
        return;
    }
    
    /* LIST FIX */
    if (command === "insertOrderedList") {
        document.execCommand("insertOrderedList", false, null);
        return;
    }
    
    if (command === "insertUnorderedList") {
        document.execCommand("insertUnorderedList", false, null);
        return;
    }
    
    document.execCommand(command, false, null);
}

function highlightText(){
    if(!activeContent) return;
    activeContent.focus();
    document.execCommand("hiliteColor",false,"yellow");
}

/* TAB SUPPORT */
document.addEventListener("keydown", e => {
    
    if (!e.target.classList.contains("note-content")) return;
    
    if (e.key === "Tab") {
        e.preventDefault();
        
        const selection = window.getSelection();
        const node = selection.anchorNode;
        
        if (!node) return;
        
        let li = node.closest ? node.closest("li") : null;
        
        if (li) {
            // Inside list → nest properly
            document.execCommand(e.shiftKey ? "outdent" : "indent");
        } else {
            // Not inside list → normal indent block
            document.execCommand(e.shiftKey ? "outdent" : "indent");
        }
    }
});

/* CHECKBOX */
function insertCheckbox(){
    if(!activeContent) return;
    activeContent.focus();
    document.execCommand("insertHTML",false,"<div><input type='checkbox'> </div>");
}

/* TABLE */
function insertTable(){
    if(!activeContent) return;
    const rows=prompt("Rows?",2);
    const cols=prompt("Columns?",2);
    if(!rows||!cols) return;

    let table="<table>";
    for(let r=0;r<rows;r++){
        table+="<tr>";
        for(let c=0;c<cols;c++){
            table+="<td contenteditable='true'></td>";
        }
        table+="</tr>";
    }
    table+="</table>";
    activeContent.focus();
    document.execCommand("insertHTML",false,table);
}

/* IMAGE + SLIDER */
function insertImage(){
    if(!activeContent) return;

    const input=document.createElement("input");
    input.type="file";
    input.accept="image/*";

    input.onchange=function(){
        const reader=new FileReader();
        reader.onload=function(e){
            const wrapper=document.createElement("div");
            wrapper.className="image-wrapper";

            const img=document.createElement("img");
            img.src=e.target.result;

            const slider=document.createElement("input");
            slider.type="range";
            slider.min="100";
            slider.max="600";
            slider.value="200";
            slider.className="image-slider";

            slider.oninput=function(){
                wrapper.style.width=this.value+"px";
            };

            wrapper.appendChild(img);
            wrapper.appendChild(slider);

            activeContent.focus();
            const range=window.getSelection().getRangeAt(0);
            range.deleteContents();
            range.insertNode(wrapper);

            const br=document.createElement("div");
            br.innerHTML="<br>";
            wrapper.after(br);
        };
        reader.readAsDataURL(this.files[0]);
    };
    input.click();
}

/* SAVE IMAGE */
function saveNoteAsImage(){
    document.querySelectorAll(".note").forEach(note=>{
        html2canvas(note).then(canvas=>{
            const link=document.createElement("a");
            link.download="note.png";
            link.href=canvas.toDataURL();
            link.click();
        });
    });
}

/* SAVE PDF */

async function saveNoteAsPDF(){

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation:"portrait",
        unit:"pt",
        format:"a6"
    });

    const notes=document.querySelectorAll(".note");

    for(let i=0;i<notes.length;i++){
        if(i>0) pdf.addPage();

        await pdf.html(notes[i],{
            x:20,
            y:20,
            width:258,
            windowWidth:notes[i].scrollWidth,
            autoPaging:"text"
        });
    }

    pdf.save("notes-copyable.pdf");
}


/* TOOLBAR TOGGLE */
function toggleToolbar(){
    document.getElementById("fabToolbar").classList.toggle("active");
    document.getElementById("fabMain").classList.toggle("rotate");
}

/* CLOSE ON OUTSIDE CLICK */
document.addEventListener("click",e=>{
    const toolbar=document.getElementById("fabToolbar");
    const main=document.getElementById("fabMain");
    if(!document.getElementById("fabContainer").contains(e.target)){
        toolbar.classList.remove("active");
        main.classList.remove("rotate");
    }
});

/* KEYBOARD SAFE FAB */
if(window.visualViewport){
    visualViewport.addEventListener("resize",()=>{
        const fab=document.getElementById("fabContainer");
        const diff=window.innerHeight-visualViewport.height;
        fab.style.bottom=diff>0?diff+20+"px":"20px";
    });
}

createNote();
</script>

</body>
</html>
